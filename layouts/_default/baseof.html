<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
    {{ $custom := resources.Get "css/_custom.css" }}
    <link rel="stylesheet" href="{{ $custom.RelPermalink }}">
</head>
<body>
    <header>
        <h1>{{ .Site.Title }}</h1>
    </header>

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <footer>
        <p>&copy; {{ now.Format "2006" }} 'S&P'</p>
    </footer>
</body>
</html>
